<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Prueba</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="Form">
        <h1>Login</h1>
        <section>
            <div class="email">
                <input type="text" placeholder="Email" autofocus><i class="bi bi-person-fill"></i>
            </div>
        </section>
        <section>
            <div class="password">
                <input type="password" placeholder="Password"><i class="bi bi-lock-fill"></i>
            </div>
        </section>
        <section>
            <div class="container">
                <label id="remember"><input type="checkbox">Remember me</label>
                <a href="#" id="forgot-password">Forgot Password</a>
            </div>
        </section>
        <section>
            <div class="login">
                <input type="button" id="button" value="Login">
            </div>
        </section>
        <div class="register">
            
            <a href="#" id="register">Don't have account? Register</a>
        </div>
    </div>
</body>
</html>
